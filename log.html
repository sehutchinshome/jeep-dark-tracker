<!doctype html><meta charset=utf-8><meta name=viewport content=width=device-width,initial-scale=1><title>RAD DAD Log</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0f14;color:#e9eef7}.wrap{max-width:900px;margin:0 auto;padding:16px}.card{background:#151c24;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px}h1{margin:0}select,input{padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:#fff}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;color:#99a3b5}td input{width:90px;padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:#fff}button{padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:linear-gradient(135deg,rgba(122,157,84,.65),rgba(177,143,53,.45));color:#fff;font-weight:700}</style><div class=wrap><div class=card><div class=row><div><h1>RAD DAD Log</h1><div id=dateTxt style="margin-top:6px;color:#99a3b5"></div></div><div class=row><label style="margin-top:6px;color:#99a3b5">Date <input id=date type=date></label><label style="margin-top:6px;color:#99a3b5">Day <select id=day></select></label></div></div><table id=tbl></table><div class=row style="margin-top:12px"><button id=clr>Clear day</button><div id=saved style="color:#99a3b5;font-size:12px"></div></div><div style="color:#99a3b5;margin-top:10px;font-size:12px">Autosaves. 4 sets per exercise.</div></div></div><script>const ex={Push:["Bench","Incline DB Press","DB Shoulder Press","Cable Pushdown","Lateral Raise"],Pull:["Lat Pulldown","Cable Row","DB Row","Face Pull","Curl"],Legs:["Squat/Goblet","RDL","Lunge/Stepup","Calves","Core"],Light:["Walk","Light circuit"],Recovery:["Stretch","Walk"]},days=["Push","Pull","Legs","Push","Pull","Light","Recovery"],W=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],s=localStorage.getItem("rad_dad_log_v1"),state=s?JSON.parse(s):{},D=document,dateEl=D.getElementById("date"),dayEl=D.getElementById("day"),tbl=D.getElementById("tbl"),saved=D.getElementById("saved"),dateTxt=D.getElementById("dateTxt");W.forEach((w,i)=>{const o=D.createElement("option");o.value=i;o.textContent=w+" • "+days[i];dayEl.appendChild(o);});function today(){return new Date().toISOString().slice(0,10);}function k(){return dateEl.value+"|"+dayEl.value;}function loadToday(){dateEl.value=today();dayEl.selectedIndex=(new Date().getDay()+6)%7;}function save(){localStorage.setItem("rad_dad_log_v1",JSON.stringify(state));saved.textContent="Saved";setTimeout(()=>saved.textContent="",1000);}function render(){const d=new Date(dateEl.value+"T00:00:00");if(!dateEl.value){dateEl.value=today();}dateTxt.textContent=d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});const exs=ex[days[+dayEl.value]||"Push"]||[];const key=k(); if(!state[key]) state[key]={};tbl.innerHTML="<tr><th>Exercise</th><th>Set</th><th>Weight</th><th>Reps</th></tr>";exs.forEach((name,idx)=>{for(let s2=1;s2<=4;s2++){const row=D.createElement("tr");if(s2===1){const td=D.createElement("td");td.rowSpan=4;td.textContent=name;td.style.color="#e9eef7";row.appendChild(td);}const tdSet=D.createElement("td");tdSet.textContent=s2;row.appendChild(tdSet);["w","r"].forEach(t=>{const td=D.createElement("td");const inp=D.createElement("input");inp.type="text";inp.placeholder=t==="w"?"lbs":"reps";const path=idx+"-"+s2+"-"+t;inp.value=state[key][path]||"";inp.addEventListener("input",()=>{state[key][path]=inp.value;save();});td.appendChild(inp);row.appendChild(td);});tbl.appendChild(row);}});}dateEl.addEventListener("change",render);dayEl.addEventListener("change",render);D.getElementById("clr").addEventListener("click",()=>{delete state[k()];save();render();});loadToday();render();</script>
